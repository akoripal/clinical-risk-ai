services:
  - type: web
    name: clinical-risk-ai
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: sh -c "uvicorn src.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: GROQ_API_KEY
        sync: false
        